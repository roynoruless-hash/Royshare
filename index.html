<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RoyShare - Secure File Sharing & Rewards</title>
    <meta name="description" content="RoyShare is a premium Telegram-powered file sharing, URL shortening, and monetization platform. Securely share files and earn rewards with our smart links." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://royshare.com/" />
    <meta property="og:title" content="RoyShare - Secure File Sharing & Rewards" />
    <meta property="og:description" content="Premium Telegram-powered file sharing, URL shortening, and monetization platform." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://royshare.com/" />
    <meta property="twitter:title" content="RoyShare - Secure File Sharing & Rewards" />
    <meta property="twitter:description" content="Premium Telegram-powered file sharing, URL shortening, and monetization platform." />
    <meta property="twitter:image" content="/og-image.png" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Proactive Telegram Initialization
      (function() {
        function initTg() {
          const tg = window.Telegram?.WebApp;
          if (tg) {
            console.log("[INDEX] Telegram SDK Found. Calling ready/expand...");
            tg.ready();
            tg.expand();
            
            // Inject Monetag SDK only if inside Telegram
            if (tg.initData && !document.getElementById('monetag-sdk')) {
              const script = document.createElement('script');
              script.id = 'monetag-sdk';
              script.src = "//libtl.com/sdk.js";
              script.setAttribute('data-zone', '11210088');
              script.setAttribute('data-sdk', 'show_11210088');
              document.head.appendChild(script);
              console.log("[MONETAG] SDK script injected via Index Init");
            }
          }
        }
        
        initTg();
        window.addEventListener('load', initTg);
        // Retry a few times
        setTimeout(initTg, 500);
        setTimeout(initTg, 1500);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
